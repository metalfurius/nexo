name: Version Bump

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: version-bump-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-pr-version:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.VERSION_BUMP_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve bump type
        id: resolve
        run: node scripts/resolveVersionBump.mjs

      - name: Validate version bump token
        if: steps.resolve.outputs.should_bump == 'true'
        env:
          VERSION_BUMP_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          if [ -z "$VERSION_BUMP_TOKEN" ]; then
            echo "VERSION_BUMP_TOKEN secret is required so version bump commits trigger normal pull_request CI."
            exit 1
          fi

      - name: Read main package version
        id: base
        if: steps.resolve.outputs.should_bump == 'true'
        run: |
          git fetch origin main --depth=1
          version="$(git show origin/main:package.json | node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync(0, 'utf8')).version)")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Bump package versions
        id: bump
        if: steps.resolve.outputs.should_bump == 'true'
        run: node scripts/bumpVersion.mjs "${{ steps.resolve.outputs.bump }}" --base-version "${{ steps.base.outputs.version }}"

      - name: Commit version files to PR
        if: steps.resolve.outputs.should_bump == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json functions/package.json functions/package-lock.json public/sw.js
          if git diff --cached --quiet; then
            echo "Version files already match v${{ steps.bump.outputs.version }}."
            exit 0
          fi
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
