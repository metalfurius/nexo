name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_DEMO_MODE: 'true'
      VITE_USE_FIREBASE_EMULATORS: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Version bump label
        if: github.event_name == 'pull_request'
        run: node scripts/resolveVersionBump.mjs
        env:
          VERSION_LABEL_REQUIRED: 'true'

      - name: Setup Java for Firebase emulators
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Local check gate
        run: npm run check

      - name: E2E smoke
        run: npm run test:e2e

      - name: PWA offline smoke
        run: npm run test:e2e:pwa

      - name: Firebase E2E smoke
        run: npm run test:e2e:firebase

      - name: Worker dry run
        run: npm run worker:check

      - name: Release file readiness
        run: npm run check:release-files

      - name: High severity audit gate
        run: npm audit --audit-level=high

      - name: Functions high severity audit gate
        run: npm run audit:functions

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
